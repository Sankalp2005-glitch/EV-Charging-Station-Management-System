<!DOCTYPE html>
<html>

<head>
    <title>EVgo - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .evgo-brand { font-size: 2rem; font-weight: 700; }
        .evgo-brand .ev { color: #10b981; }
        .evgo-brand .go { color: #6b7280; }
        .bg-dark .evgo-brand .go, .navbar-dark .evgo-brand .go { color: #ffffff; }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <span class="evgo-brand"><span class="ev">EV</span><span class="go">go</span></span>
                        </div>
                        <h3 class="text-center mb-4">Login</h3>

                        <form id="loginForm">
                            <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
                            <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password"
                                required>

                            <button type="submit" class="btn btn-success w-100">Login</button>
                        </form>

                        <div class="text-center mt-2">
                            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                        </div>

                        <div class="text-center mt-2">
                            <a href="index.html">Create a new account</a>
                        </div>

                        <!-- Forgot Password Section -->
                        <div id="forgotPasswordSection" style="display:none;" class="mt-4 border-top pt-3">
                            <h5 class="text-center mb-3">Reset Password</h5>
                            <form id="forgotPasswordForm">
                                <input type="email" id="resetEmail" class="form-control mb-3" placeholder="Your registered email" required>
                                <input type="password" id="resetNewPassword" class="form-control mb-3" placeholder="New password (min 8 chars)" required>
                                <input type="password" id="resetConfirmPassword" class="form-control mb-3" placeholder="Confirm new password" required>
                                <button type="submit" class="btn btn-warning w-100">Reset Password</button>
                            </form>
                            <div class="text-center mt-2">
                                <a href="#" id="backToLoginLink">Back to Login</a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
