<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Register</h3>

                        <form id="registerForm">
                            <input type="text" id="name" class="form-control mb-3" placeholder="Name" required>
                            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                            <input type="text" id="phone" class="form-control mb-3" placeholder="Phone" required>
                            <input type="password" id="password" class="form-control mb-3" placeholder="Password"
                                required>

                            <select id="role" class="form-select mb-3">
                                <option value="customer">Customer</option>
                                <option value="owner">Owner</option>
                            </select>

                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="login.html">Already have an account?</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
